<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regulatory Affairs Triage Dashboard</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            font-size: 12px; 
            margin: 40px; 
            background: #ffffff; 
            color: #000000; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 14px;
            font-weight: normal;
            border-bottom: 1px solid #000;
            padding-bottom: 20px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 60px; 
            margin-bottom: 40px;
        }
        .column { 
            background: #ffffff; 
        }
        .column-title { 
            font-size: 12px; 
            font-weight: normal; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid #000000; 
        }
        .item { 
            margin-bottom: 20px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #e5e5e5; 
        }
        .item-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .item a { 
            color: #000000; 
            text-decoration: none; 
            font-weight: normal; 
            line-height: 1.5;
        }
        .item a:hover { 
            text-decoration: underline; 
        }
        .tag { 
            display: inline-block; 
            font-size: 10px; 
            padding: 4px 6px; 
            border: 1px solid #000000; 
            background: #ffffff; 
            color: #000000;
            align-self: flex-start;
            transition: all 0.2s ease;
        }
        .tag:hover {
            background: #000000;
            color: #ffffff;
        }
        .meta-dates {
            font-size: 10px;
            color: #666666; 
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
        }
        .meta-dates span strong {
            color: #000000; 
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h1>Regulatory Affairs Feed Triage</h1>

    <div class="dashboard">
        <div class="column">
            <div class="column-title">Track &amp; Assess</div>
            <div id="track-assess-list">Loading items...</div>
        </div>
        
        <div class="column">
            <div class="column-title">Track &amp; Inform</div>
            <div id="track-inform-list">Loading items...</div>
        </div>
        
        <div class="column">
            <div class="column-title">Not Tracked</div>
            <div id="not-tracked-list">Loading items...</div>
        </div>
    </div>

    <rssapp-feed id="_y0uTgPk92tFxD735"></rssapp-feed>
    <script src="https://widget.rss.app/v1/feed.js" type="text/javascript" async></script>

    <script>
        // Fetch the data.json file generated by your GitHub Action
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const assessList = document.getElementById('track-assess-list');
                const informList = document.getElementById('track-inform-list');
                const ignoredList = document.getElementById('not-tracked-list');
                
                // Clear loading indicators
                assessList.innerHTML = '';
                informList.innerHTML = '';
                ignoredList.innerHTML = '';
                
                if(data.length === 0) {
                    assessList.innerHTML = 'No items found.';
                    informList.innerHTML = 'No items found.';
                    ignoredList.innerHTML = 'No items found.';
                    return;
                }

                data.forEach(item => {
                    // Build the dates HTML only if the data exists
                    let dateHtml = '';
                    if (item.noticeDate || item.dueDate) {
                        dateHtml = '<div class="meta-dates">';
                        if (item.noticeDate) {
                            dateHtml += `<span><strong>Notice:</strong> ${item.noticeDate}</span>`;
                        }
                        if (item.dueDate) {
                            dateHtml += `<span><strong>Due:</strong> ${item.dueDate}</span>`;
                        }
                        dateHtml += '</div>';
                    }

                    let formattedDate = '';
                    if (item.pubDate) {
                        const d = new Date(item.pubDate);
                        if (!isNaN(d)) {
                            formattedDate = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase() + ' - ';
                        }
                    }

                    const html = `
                        <div class="item">
                            <div class="item-header">
                                <a href="${item.link}" target="_blank">${formattedDate}${item.title}</a>
                                <span class="tag">${item.category}</span>
                            </div>
                            ${dateHtml}
                        </div>
                    `;
                    
                    if (item.action === "Track & assess") {
                        assessList.innerHTML += html;
                    } else if (item.action === "Track and inform") {
                        informList.innerHTML += html;
                    } else {
                        ignoredList.innerHTML += html;
                    }
                });
            })
            .catch(err => {
                console.error("Error loading triage data:", err);
                document.querySelectorAll('.column div[id$="-list"]').forEach(el => el.innerHTML = "Error loading updates.");
            });
    </script>
</body>
</html>

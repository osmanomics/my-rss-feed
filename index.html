<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regulatory Affairs Triage Dashboard</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            font-size: 14px; 
            margin: 20px; 
            background: #121212; 
            color: #e0e0e0; 
        }
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-bottom: 40px;
        }
        .column { 
            background: #121212; 
            padding: 20px; 
            border: 1px solid #333333; 
            border-radius: 8px; 
        }
        .column-title { 
            font-size: 1.25rem; 
            font-weight: bold; 
            margin-bottom: 15px; 
            padding-bottom: 5px; 
            border-bottom: 2px solid #333333; 
        }
        .item { 
            margin-bottom: 12px; 
            padding-bottom: 12px; 
            border-bottom: 1px solid #333333; 
        }
        .item-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .item a { 
            color: #e0e0e0; 
            text-decoration: none; 
            font-weight: 500; 
        }
        .item a:hover { 
            text-decoration: underline; 
            color: #ffffff; 
        }
        .tag { 
            display: inline-block; 
            font-size: 0.75rem; 
            padding: 2px 6px; 
            border-radius: 4px; 
            background: #2a2a2a; 
            color: #e0e0e0;
            font-weight: bold;
        }
        .meta-dates {
            font-size: 0.8rem;
            color: #999999; /* Muted gray to visually separate it from the title */
            display: flex;
            gap: 15px;
        }
        .meta-dates span strong {
            color: #c0c0c0; /* Slightly brighter for the label */
        }
    </style>
</head>
<body>

    <h1>Regulatory Affairs Feed Triage</h1>

    <div class="dashboard">
        <div class="column">
            <div class="column-title">Track &amp; Assess</div>
            <div id="track-assess-list">Loading items...</div>
        </div>
        
        <div class="column">
            <div class="column-title">Track &amp; Inform</div>
            <div id="track-inform-list">Loading items...</div>
        </div>
        
        <div class="column">
            <div class="column-title">Not Tracked</div>
            <div id="not-tracked-list">Loading items...</div>
        </div>
    </div>

    <rssapp-feed id="_y0uTgPk92tFxD735"></rssapp-feed>
    <script src="https://widget.rss.app/v1/feed.js" type="text/javascript" async></script>

    <script>
        // Fetch the data.json file generated by your GitHub Action
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const assessList = document.getElementById('track-assess-list');
                const informList = document.getElementById('track-inform-list');
                const ignoredList = document.getElementById('not-tracked-list');
                
                // Clear loading indicators
                assessList.innerHTML = '';
                informList.innerHTML = '';
                ignoredList.innerHTML = '';
                
                if(data.length === 0) {
                    assessList.innerHTML = 'No items found.';
                    informList.innerHTML = 'No items found.';
                    ignoredList.innerHTML = 'No items found.';
                    return;
                }

                data.forEach(item => {
                    // Build the dates HTML only if the data exists
                    let dateHtml = '';
                    if (item.noticeDate || item.dueDate) {
                        dateHtml = '<div class="meta-dates">';
                        if (item.noticeDate) {
                            dateHtml += `<span><strong>Notice:</strong> ${item.noticeDate}</span>`;
                        }
                        if (item.dueDate) {
                            dateHtml += `<span><strong>Due:</strong> ${item.dueDate}</span>`;
                        }
                        dateHtml += '</div>';
                    }

                    const html = `
                        <div class="item">
                            <div class="item-header">
                                <a href="${item.link}" target="_blank">${item.title}</a>
                                <span class="tag">${item.category}</span>
                            </div>
                            ${dateHtml}
                        </div>
                    `;
                    
                    if (item.action === "Track & assess") {
                        assessList.innerHTML += html;
                    } else if (item.action === "Track and inform") {
                        informList.innerHTML += html;
                    } else {
                        ignoredList.innerHTML += html;
                    }
                });
            })
            .catch(err => {
                console.error("Error loading triage data:", err);
                document.querySelectorAll('.column div[id$="-list"]').forEach(el => el.innerHTML = "Error loading updates.");
            });
    </script>
</body>
</html>

name: Automated Regulatory Intelligence Update

on:
  schedule:
    # This runs the script every day at 08:00 AM UTC (Adjust as needed)
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to click a button and run it manually anytime

permissions:
  contents: write # Gives the action permission to update and save index.html / Excel

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone your repository files into the runner container
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up a clean Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    # Step 3: Install the required libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests openpyxl

    # Step 4: Run your script safely using your hidden API token
    - name: Run AI Classification Pipeline
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python feed_classifier.py

    # Step 5: Check back in the modified index.html and tracking spreadsheet
    - name: Commit and Push Updates
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add index.html regulatory_tracking_report.xlsx
        
        # Only commit if changes actually occurred (prevents empty commit errors)
        git diff-index --quiet HEAD || (git commit -m "Automated AI Regulatory Feed Update [skip ci]" && git push)

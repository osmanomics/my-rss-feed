name: Weekly RSS Email Automation

on:
  schedule:
    # Runs at 23:00 UTC every Sunday (which is 6:00 PM EST / 7:00 PM EDT)
    # Adjust the '23' (hour) if you want it sent later in the night your local time.
    - cron: '0 23 * * 0'
  workflow_dispatch: # This line adds a "Run workflow" button so you can test it manually!

jobs:
  send_email:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser

    - name: Run weekly email script
      env:
        # Pulls your secure credentials from GitHub Secrets
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python send_weekly_summary.py

name: Triage Regulatory RSS Feed

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch:      # Allows you to manually click a button to run it immediately

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Gives the runner permission to push the updated json file back

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install feedparser requests

    - name: Run DeepSeek Classifier
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python update_feed.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        # Only commit if there are actually changes to avoid breaking errors
        git diff-index --quiet HEAD || (git commit -m "Auto-update categorized regulatory feed" && git push)